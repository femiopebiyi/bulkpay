[package]
name        = "bulk_pay"
version     = "0.1.0"
description = "Created with Anchor"
edition     = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name       = "bulk_pay"

[features]
default        = []
cpi            = ["no-entrypoint"]
no-entrypoint  = []
no-idl         = []
no-log-ix-name = []
idl-build      = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
# ✅ features declared here — not inherited from workspace
# idl-build only activates via the feature gate above, not by default
anchor-lang = { workspace = true, features = ["init-if-needed"] }
anchor-spl  = { workspace = true, features = ["token", "associated_token"] }

[lints.rust]
unexpected_cfgs = { level = "allow" }
deprecated      = "allow"
