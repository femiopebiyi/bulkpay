[workspace]
members  = ["programs/*"]
resolver = "2"

[workspace.dependencies]
# ✅ No features here — each crate declares what it needs
anchor-lang = { version = "0.31.1" }
anchor-spl  = { version = "0.31.1" }

[profile.release]
overflow-checks = true
lto             = "fat"
codegen-units   = 1

[profile.release.build-override]
opt-level     = 3
incremental   = false
codegen-units = 1
