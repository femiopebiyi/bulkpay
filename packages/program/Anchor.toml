[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
bulk_pay = "Bh6ADbE6SmBjta1YYSGvMp3i4Tqomey9NcFdpgHJAhpT"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/**/*.test.ts'"
test-account-suite = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/create_account.test.ts' 'tests/init_transfer_log.test.ts'"
test-bulk-atomic = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/bulk_transfer/atomicity.test.ts'"
test-bulk-fail = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/bulk_transfer/failures.test.ts'"
test-bulk-happy = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/bulk_transfer/happy_path.test.ts'"
test-bulk-log = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/bulk_transfer/transfer_log.test.ts'"
test-bulk-realloc = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/bulk_transfer/realloc.test.ts'"
test-bulk-security = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/bulk_transfer/security.test.ts'"
test-bulk-suite = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/bulk_transfer/*.test.ts'"
test-create-account = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/create_account.test.ts'"
test-init-log = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/init_transfer_log.test.ts'"

# ── bulk happy path isos ──────────────────────────────────────────────────
test-bulk-happy-iso-max = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts --grep 'works at the maximum account'"
test-bulk-happy-token-transfer = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts --grep 'token transfers'"
test-bulk-happy-token-lifecycle = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts --grep 'ATA lifecycle'"
test-bulk-happy-token-transfer_log = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts --grep 'transfer log integrity'"

# ── atomicity tests ──────────────────────────────────────────────────
test-atomicity-all = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts --grep 'atomicity'"
test-atomicity-invalid-mid-batch = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts --grep 'rolls back ALL transfers when sender balance is insufficient'"
test-atomicity-invalid-no-increment = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts --grep 'does not increment all_time_amount_sent when'"


test-security-tracking = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts --grep 'works at the maximum batch size'"